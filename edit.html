<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Fork - 編集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-logo">
      <a href="index.html" style="text-decoration:none">
        <h1>Story Fork</h1>
        <span class="header-tagline">分岐ゲームをつくろう・あそぼう</span>
      </a>
    </div>
    <div class="header-right">
      <div id="user-info" style="display:none">
        <div class="user-menu">
          <span id="user-name" onclick="toggleUserMenu()">
            <img id="header-avatar" src="" alt="" style="display:none">
            <div id="header-avatar-placeholder" class="header-avatar-placeholder"></div>
            <span id="user-name-text"></span>
            <span class="user-caret">▾</span>
          </span>
          <div id="user-dropdown" style="display:none">
            <a href="mypage.html">マイページ</a>
            <button onclick="logout()">ログアウト</button>
          </div>
        </div>
      </div>
      <div id="login-btns" style="display:none">
        <button class="login-btn" onclick="location.href='index.html'">ログイン</button>
      </div>
    </div>
  </header>

  <main>
    <div id="not-authorized" style="display:none">
      <div class="login-required">
        <h2>編集権限がありません</h2>
        <p>このゲームを編集する権限がありません</p>
        <button class="submit-btn" onclick="location.href='index.html'">トップへ戻る</button>
      </div>
    </div>

    <div id="edit-main" style="display:none">
      <div class="edit-top-bar">
        <h2>✏️ ゲームを編集</h2>
        <div style="display:flex;gap:8px;">
          <button class="draft-save-btn" onclick="saveDraft()">💾 下書き保存</button>
          <button class="submit-btn" onclick="updateGame()">更新する</button>
          <a href="mypage.html" class="back-form-btn">← マイページへ</a>
        </div>
      </div>

      <!-- 作成タブ -->
      <div class="create-tabs">
        <button class="create-tab-btn active" onclick="switchEditTab('editor')">✏️ エディタ</button>
        <button class="create-tab-btn" onclick="switchEditTab('draw')">🎨 お絵かき</button>
      </div>

      <!-- エディタパネル -->
      <div id="edit-editor-panel">
        <div class="form-row">
          <label>タイトル</label>
          <input type="text" id="edit-title" placeholder="ゲームのタイトル">
        </div>
        <div class="form-row">
          <label>ジャンル（3つまで選択）</label>
          <div id="edit-genre-checkboxes" class="genre-checkbox-grid">
            <label class="genre-check"><input type="checkbox" value="RPG" onchange="updateEditGenre()">RPG</label>
            <label class="genre-check"><input type="checkbox" value="TRPG" onchange="updateEditGenre()">TRPG</label>
            <label class="genre-check"><input type="checkbox" value="RP" onchange="updateEditGenre()">RP</label>
            <label class="genre-check"><input type="checkbox" value="料理" onchange="updateEditGenre()">料理</label>
            <label class="genre-check"><input type="checkbox" value="ラブストーリー" onchange="updateEditGenre()">ラブストーリー</label>
            <label class="genre-check"><input type="checkbox" value="ホラー" onchange="updateEditGenre()">ホラー</label>
            <label class="genre-check"><input type="checkbox" value="推理・ミステリー" onchange="updateEditGenre()">推理・ミステリー</label>
            <label class="genre-check"><input type="checkbox" value="コメディ" onchange="updateEditGenre()">コメディ</label>
            <label class="genre-check"><input type="checkbox" value="選択" onchange="updateEditGenre()">選択</label>
            <label class="genre-check"><input type="checkbox" value="診断" onchange="updateEditGenre()">診断</label>
            <label class="genre-check"><input type="checkbox" value="その他" onchange="updateEditGenre()">その他</label>
          </div>
          <p id="edit-genre-count" class="genre-count">0 / 3 選択中</p>
        </div>
        <div class="form-row">
          <label>タグ（スペース区切りで複数入力可）</label>
          <input type="text" id="edit-tags" placeholder="例：ホラー 短編 初心者向け">
        </div>
        <div class="form-row">
          <label>説明</label>
          <input type="text" id="edit-description" placeholder="どんなゲームか一言で">
        </div>
        <div class="form-row">
          <label>サムネイル画像</label>
          <input type="file" id="edit-thumbnail" accept="image/*" onchange="previewEditThumbnail(this)">
          <img id="edit-thumbnail-preview" src="" alt="" style="display:none; width:200px; border-radius:8px; margin-top:8px;">
        </div>

        <div id="edit-library-panel">
          <h3>要素ライブラリ</h3>
          <p class="lib-hint">{ ライブラリ名 } と書くとテキストに値を表示できます。</p>
          <div id="edit-library-list"></div>
          <div id="edit-library-buttons">
            <button onclick="addEditLibrary('affection')">好感度</button>
            <button onclick="addEditLibrary('dice')">ダイス</button>
            <button onclick="addEditLibrary('saikoro')">さいころ</button>
            <button onclick="addEditLibrary('san')">SAN値</button>
            <button onclick="addEditLibrary('counter')">カウンター</button>
            <button onclick="addEditLibrary('money')">所持金</button>
            <button onclick="addEditLibrary('time')">時間・日数</button>
            <button onclick="addEditLibrary('flag')">フラグ</button>
            <button onclick="addEditLibrary('status')">状態</button>
            <button onclick="addEditLibrary('hp')">HP</button>
            <button onclick="addEditLibrary('mp')">MP</button>
            <button onclick="addEditLibrary('level')">レベル</button>
            <button onclick="addEditLibrary('exp')">EXP</button>
            <button onclick="addEditLibrary('inventory')">アイテム</button>
            <button onclick="addEditLibrary('skill')">技能値</button>
            <button onclick="addEditLibrary('charsheet')">キャラシート</button>
            <button onclick="addEditLibrary('score')">スコア</button>
            <button onclick="addEditLibrary('timer')">タイマー</button>
            <button onclick="addEditLibrary('result')">結果表示</button>
            <button onclick="addEditLibrary('character')">キャラクター</button>
          </div>
          <div class="custom-var-section">
            <h4>オリジナル変数</h4>
            <div id="edit-custom-var-list"></div>
            <button class="add-btn" onclick="addEditCustomVar()">＋ オリジナル変数を追加</button>
          </div>
        </div>

        <div id="edit-tree-editor">
          <div class="tree-header">
            <h3>シーンツリー <span id="edit-scene-stats" class="scene-stats"></span></h3>
            <button class="sort-scenes-btn" onclick="sortEditScenes()">🔀 自動整列</button>
          </div>
          <div id="edit-scene-tree"></div>
        </div>
      </div>

      <!-- お絵かきパネル -->
      <div id="edit-draw-panel" style="display:none">
        <div class="draw-toolbar">
          <div class="draw-tool-group">
            <button class="draw-tool active" id="edit-tool-pen" onclick="setEditDrawTool('pen')">✏️</button>
            <button class="draw-tool" id="edit-tool-eraser" onclick="setEditDrawTool('eraser')">🧹</button>
            <button class="draw-tool" id="edit-tool-fill" onclick="setEditDrawTool('fill')">🪣</button>
            <button class="draw-tool" id="edit-tool-eyedrop" onclick="setEditDrawTool('eyedrop')">💉</button>
            <button class="draw-tool" id="edit-tool-move" onclick="setEditDrawTool('move')">✋</button>
          </div>
          <div class="draw-tool-group">
            <label class="draw-label">モード</label>
            <select id="edit-draw-mode" onchange="setEditDrawMode(this.value)">
              <option value="normal">イラスト</option>
              <option value="dot">ドット絵</option>
            </select>
            <div id="edit-dot-size-group" style="display:none">
              <label class="draw-label">粗さ</label>
              <select id="edit-dot-size" onchange="setEditDotSize(parseInt(this.value))">
                <option value="1">1px（超細かい）</option>
                <option value="2">2px（細かい）</option>
                <option value="4">4px（小さい）</option>
                <option value="8" selected>8px（標準）</option>
                <option value="16">16px（荒い）</option>
                <option value="32">32px（超荒い）</option>
                <option value="64">64px（めちゃ荒い）</option>
              </select>
            </div>
          </div>
          <div class="draw-tool-group">
            <label class="draw-label">太さ</label>
            <input type="range" id="edit-pen-size" min="1" max="50" value="4" oninput="setEditPenSize(this.value)">
            <span id="edit-pen-size-display">4</span>
          </div>
          <div class="draw-tool-group">
            <label class="draw-label">色</label>
            <input type="color" id="edit-draw-color" value="#000000" onchange="setEditDrawColor(this.value)">
          </div>
          <div class="draw-tool-group draw-palette">
            <span class="palette-swatch" style="background:#000000" onclick="setEditDrawColor('#000000')"></span>
            <span class="palette-swatch" style="background:#ffffff" onclick="setEditDrawColor('#ffffff')"></span>
            <span class="palette-swatch" style="background:#e94560" onclick="setEditDrawColor('#e94560')"></span>
            <span class="palette-swatch" style="background:#00c896" onclick="setEditDrawColor('#00c896')"></span>
            <span class="palette-swatch" style="background:#1a6fc4" onclick="setEditDrawColor('#1a6fc4')"></span>
            <span class="palette-swatch" style="background:#7f77dd" onclick="setEditDrawColor('#7f77dd')"></span>
            <span class="palette-swatch" style="background:#e8760a" onclick="setEditDrawColor('#e8760a')"></span>
            <span class="palette-swatch" style="background:#ffd700" onclick="setEditDrawColor('#ffd700')"></span>
          </div>
          <div class="draw-tool-group">
            <button class="draw-action-btn" onclick="editDrawUndo()">↩️</button>
            <button class="draw-action-btn" onclick="editDrawRedo()">↪️</button>
            <button class="draw-action-btn" onclick="editDrawClear()">🗑️</button>
            <button class="draw-action-btn" onclick="editDrawZoomIn()">＋</button>
            <button class="draw-action-btn" onclick="editDrawZoomOut()">－</button>
          </div>
        </div>
        <div class="draw-canvas-wrap">
          <canvas id="edit-draw-canvas" width="800" height="600"></canvas>
        </div>
        <div class="draw-output-btns">
          <button class="submit-btn" onclick="applyEditDrawAsThumbnail()">サムネイルに使用</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="edit.js"></script>
</body>
</html>
