<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Fork</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Story Fork</h1>
    <div class="header-right">
      <div id="user-info" style="display:none">
        <div class="user-menu">
          <span id="user-name" onclick="toggleUserMenu()"></span>
          <div id="user-dropdown" style="display:none">
            <button onclick="logout()">ログアウト</button>
          </div>
        </div>
      </div>
      <div id="login-btns">
        <button class="login-btn" onclick="showLoginModal()">ログイン</button>
      </div>
      <nav>
        <button class="tab-btn active" onclick="showTab('play')">遊ぶ</button>
        <button class="tab-btn" onclick="showTab('create')">作る</button>
      </nav>
    </div>
  </header>

  <div id="login-modal" style="display:none">
    <div class="modal-overlay" onclick="hideLoginModal()"></div>
    <div class="modal">
      <h2>ログイン / 新規登録</h2>
      <p class="modal-hint">ユーザー名は製作者名として表示されます。わかりやすい名前をつけてください！</p>

      <button class="google-login-btn" onclick="loginWithGoogle()">Googleでログイン</button>

      <div class="modal-divider">または</div>

      <div id="modal-tabs">
        <button class="modal-tab active" onclick="switchModalTab('login')">ログイン</button>
        <button class="modal-tab" onclick="switchModalTab('register')">新規登録</button>
      </div>

      <div id="login-form">
        <input type="email" id="login-email" placeholder="メールアドレス">
        <input type="password" id="login-password" placeholder="パスワード">
        <button class="submit-btn" onclick="loginWithEmail()">ログイン</button>
      </div>

      <div id="register-form" style="display:none">
        <input type="text" id="register-username" placeholder="ユーザー名（製作者名として表示されます）">
        <input type="email" id="register-email" placeholder="メールアドレス">
        <input type="password" id="register-password" placeholder="パスワード（6文字以上）">
        <button class="submit-btn" onclick="registerWithEmail()">登録する</button>
      </div>

      <button class="modal-close" onclick="hideLoginModal()">✕ 閉じる</button>
    </div>
  </div>

  <main>

    <div id="play-tab">
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="タイトル・作者名・ジャンルで検索..." oninput="searchGames()">
      </div>
      <div id="genre-filter">
        <button class="genre-btn active" onclick="filterGenre('all')">すべて</button>
        <button class="genre-btn" onclick="filterGenre('RPG')">RPG</button>
        <button class="genre-btn" onclick="filterGenre('TRPG')">TRPG</button>
        <button class="genre-btn" onclick="filterGenre('RP')">RP</button>
        <button class="genre-btn" onclick="filterGenre('料理')">料理</button>
        <button class="genre-btn" onclick="filterGenre('ラブストーリー')">ラブストーリー</button>
        <button class="genre-btn" onclick="filterGenre('ホラー')">ホラー</button>
        <button class="genre-btn" onclick="filterGenre('推理・ミステリー')">推理・ミステリー</button>
        <button class="genre-btn" onclick="filterGenre('コメディ')">コメディ</button>
        <button class="genre-btn" onclick="filterGenre('選択')">選択</button>
        <button class="genre-btn" onclick="filterGenre('診断')">診断</button>
        <button class="genre-btn" onclick="filterGenre('その他')">その他</button>
      </div>
      <div id="game-list"></div>
    </div>

    <div id="create-tab" style="display:none">
      <div id="not-logged-in" style="display:none">
        <div class="login-required">
          <h2>ゲームを作るにはログインが必要です</h2>
          <p>右上の「ログイン」からアカウントを作ってください！</p>
          <button class="submit-btn" onclick="showLoginModal()">ログイン / 登録</button>
        </div>
      </div>

      <div id="mode-select" style="display:none">
        <h2>どのモードで作りますか？</h2>
        <div class="mode-cards">
          <div class="mode-card" onclick="startCreate('simple')">
            <h3>シンプルモード</h3>
            <p>テキストと選択肢だけのシンプルなゲームが作れます</p>
          </div>
          <div class="mode-card" onclick="startCreate('normal')">
            <h3>普通モード</h3>
            <p>フラグ・ライブラリ・IF条件など全機能が使えます</p>
          </div>
        </div>
      </div>

      <div id="game-form" style="display:none">
        <button class="back-form-btn" onclick="backToModeSelect()">← 選択画面に戻る</button>
        <div id="form-header">
          <div class="form-row">
            <label>タイトル</label>
            <input type="text" id="game-title" placeholder="ゲームのタイトル">
          </div>
          <div class="form-row">
            <label>ジャンル</label>
            <select id="game-genre" onchange="updateGenre()">
              <option value="RPG">RPG</option>
              <option value="TRPG">TRPG</option>
              <option value="RP">RP</option>
              <option value="料理">料理</option>
              <option value="ラブストーリー">ラブストーリー</option>
              <option value="ホラー">ホラー</option>
              <option value="推理・ミステリー">推理・ミステリー</option>
              <option value="コメディ">コメディ</option>
              <option value="選択">選択</option>
              <option value="診断">診断</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-row">
            <label>説明</label>
            <input type="text" id="game-description" placeholder="どんなゲームか一言で">
          </div>
          <div class="form-row">
            <label>製作者名</label>
            <input type="text" id="game-author" placeholder="ログイン中のユーザー名が自動入力されます" readonly>
          </div>
          <div class="form-row">
            <label>サムネイル画像（任意）</label>
            <input type="file" id="game-thumbnail" accept="image/*" onchange="previewThumbnail(this)">
            <img id="thumbnail-preview" src="" alt="" style="display:none; width:200px; border-radius:8px; margin-top:8px;">
          </div>
        </div>

        <div id="library-panel">
          <h3>要素ライブラリ</h3>
          <div id="library-list"></div>
          <div id="library-buttons">
            <button onclick="addLibrary('affection')">好感度を追加</button>
            <button onclick="addLibrary('dice')">ダイスを追加</button>
            <button onclick="addLibrary('saikoro')">さいころを追加</button>
            <button onclick="addLibrary('san')">SAN値を追加</button>
            <button onclick="addLibrary('counter')">カウンターを追加</button>
            <button onclick="addLibrary('money')">所持金を追加</button>
            <button onclick="addLibrary('time')">時間・日数を追加</button>
            <button onclick="addLibrary('flag')">フラグを追加</button>
            <button onclick="addLibrary('status')">天気・状態を追加</button>
          </div>
        </div>

        <div id="tree-editor">
          <h3>シーンツリー</h3>
          <div id="scene-tree"></div>
        </div>

        <button id="upload-btn" onclick="uploadGame()">アップロード</button>
      </div>
    </div>

  </main>

  <footer id="footer" style="display:none">
    <span id="footer-user-name"></span>
    <button class="footer-logout-btn" onclick="logout()">ログアウト</button>
  </footer>

  <script type="module" src="index.js"></script>
</body>
</html>
