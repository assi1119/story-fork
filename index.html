<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Fork - Professional Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-logo" onclick="showMainTab('play')">
      <h1>Story Fork</h1>
      <span class="header-tagline">物語を分岐させ、運命をダイスに託す</span>
    </div>
    <div class="header-right">
      <div id="user-info" style="display:none">
        <div class="user-menu">
          <span id="user-name" onclick="toggleUserMenu()">
            <img id="header-avatar" src="" alt="" style="display:none">
            <div id="header-avatar-placeholder" class="header-avatar-placeholder"></div>
            <span id="user-name-text"></span>
            <span class="user-caret">▾</span>
          </span>
          <div id="user-dropdown" style="display:none">
            <a href="mypage.html">マイページ</a>
            <button onclick="openTRPGModal()">キャラクター作成(TRPG)</button>
            <button onclick="logout()">ログアウト</button>
          </div>
        </div>
      </div>
      <div id="login-btns">
        <button class="login-btn" onclick="showLoginModal()">ログイン / 新規登録</button>
      </div>
      <button class="hamburger-btn" onclick="toggleSideMenu()">☰</button>
    </div>
  </header>

  <div id="side-menu" class="side-menu">
    <div class="side-menu-header">
      <span>メインメニュー</span>
      <button onclick="toggleSideMenu()">✕</button>
    </div>
    <div class="side-menu-body">
      <button class="side-menu-item active" onclick="showMainTab('play'); toggleSideMenu()">🎮 ゲームを遊ぶ</button>
      <button class="side-menu-item" onclick="showMainTab('create'); toggleSideMenu()">✏️ 物語を作る</button>
      <button class="side-menu-item" onclick="showMainTab('notice'); toggleSideMenu()">📢 運営からのお知らせ</button>
      <button class="side-menu-item" onclick="showMainTab('board'); toggleSideMenu()">💬 交流掲示板</button>
      <div class="side-menu-divider"></div>
      <div class="side-menu-section-title">🎲 TRPG専用</div>
      <button class="side-menu-item" onclick="openTRPGModal(); toggleSideMenu()">👤 新規キャラ作成</button>
      <button class="side-menu-item" onclick="showCharacterList(); toggleSideMenu()">🗃️ 所持キャラ一覧</button>
      <div class="side-menu-divider"></div>
      <div class="side-menu-section-title">📂 下書き</div>
      <div id="draft-list-menu"></div>
    </div>
  </div>
  <div id="side-overlay" class="side-overlay" onclick="toggleSideMenu()"></div>

  <div id="login-modal" style="display:none">
    <div class="modal-overlay" onclick="hideLoginModal()"></div>
    <div class="modal">
      <h2>ログイン / 新規登録</h2>
      <button class="google-login-btn" onclick="loginWithGoogle()">Googleアカウントで続行</button>
      <div class="modal-divider">または</div>
      <div id="modal-tabs">
        <button class="modal-tab active" onclick="switchModalTab('login')">ログイン</button>
        <button class="modal-tab" onclick="switchModalTab('register')">新規登録</button>
      </div>
      <div id="login-form">
        <input type="email" id="login-email" placeholder="メールアドレス">
        <input type="password" id="login-password" placeholder="パスワード">
        <button class="submit-btn" onclick="loginWithEmail()">ログイン</button>
      </div>
      <div id="register-form" style="display:none">
        <input type="text" id="register-username" placeholder="製作者名(ユーザー名)">
        <input type="email" id="register-email" placeholder="メールアドレス">
        <input type="password" id="register-password" placeholder="パスワード(6文字以上)">
        <button class="submit-btn" onclick="registerWithEmail()">アカウント作成</button>
      </div>
      <button class="modal-close" onclick="hideLoginModal()">✕</button>
    </div>
  </div>

  <main>
    <div id="play-tab">
      <div class="sort-bar">
        <button class="sort-btn active" onclick="setSortOrder('new')">新着順</button>
        <button class="sort-btn" onclick="setSortOrder('popular')">人気順</button>
        <button class="sort-btn" onclick="setSortOrder('likes')">いいね順</button>
      </div>
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="キーワード・作者・タグで検索..." oninput="searchGames()">
      </div>
      <div id="genre-filter">
        <button class="genre-btn active" onclick="filterGenre('all')">すべて</button>
        <button class="genre-btn" onclick="filterGenre('RPG')">RPG</button>
        <button class="genre-btn" onclick="filterGenre('TRPG')">TRPG</button>
        <button class="genre-btn" onclick="filterGenre('ホラー')">ホラー</button>
        <button class="genre-btn" onclick="filterGenre('ラブストーリー')">恋愛</button>
        <button class="genre-btn" onclick="filterGenre('推理・ミステリー')">推理</button>
        <button class="genre-btn" onclick="filterGenre('コメディ')">ギャグ</button>
        <button class="genre-btn" onclick="filterGenre('料理')">料理</button>
        <button class="genre-btn" onclick="filterGenre('診断')">診断</button>
        <button class="genre-btn" onclick="filterGenre('その他')">その他</button>
      </div>
      <div id="game-list"></div>
    </div>

    <div id="create-tab" style="display:none">
      <div id="mode-select">
        <h2>制作モードの選択</h2>
        <div class="mode-cards">
          <div class="mode-card" onclick="startCreate('simple')">
            <h3>シンプルモード</h3>
            <p>テキストと選択肢のみ。手軽に作りたい方向け。</p>
          </div>
          <div class="mode-card" onclick="startCreate('normal')">
            <h3>普通モード</h3>
            <p>変数、フラグ、複雑な分岐など全機能が使用可能。</p>
          </div>
          <div class="mode-card" onclick="startCreate('trpg')">
            <h3>TRPGモード</h3>
            <p>キャラ・アイテム依存。TRPGタグが強制付与されます。</p>
          </div>
        </div>
      </div>

      <div id="game-form" style="display:none">
        <div class="form-header-actions">
          <button class="back-form-btn" onclick="backToModeSelect()">← モード選択に戻る</button>
          <button class="draft-save-btn" onclick="saveDraft()">💾 下書き保存</button>
        </div>

        <div id="form-header">
          <div class="form-row"><label>タイトル</label><input type="text" id="game-title"></div>
          <div class="form-row">
            <label>ジャンル(最大3つ)</label>
            <div id="genre-checkboxes" class="genre-checkbox-grid">
              <label><input type="checkbox" value="RPG">RPG</label>
              <label><input type="checkbox" value="TRPG">TRPG</label>
              <label><input type="checkbox" value="RP">RP</label>
              <label><input type="checkbox" value="料理">料理</label>
              <label><input type="checkbox" value="ラブストーリー">恋愛</label>
              <label><input type="checkbox" value="ホラー">ホラー</label>
              <label><input type="checkbox" value="推理・ミステリー">推理</label>
              <label><input type="checkbox" value="コメディ">コメディ</label>
              <label><input type="checkbox" value="選択">選択</label>
              <label><input type="checkbox" value="診断">診断</label>
              <label><input type="checkbox" value="その他">その他</label>
            </div>
          </div>
          <div class="form-row"><label>タグ</label><input type="text" id="game-tags" placeholder="例: 初心者歓迎 現代探索"></div>
          <div class="form-row"><label>説明文</label><textarea id="game-description" rows="2"></textarea></div>
          <div class="form-row">
            <label>サムネイル</label>
            <input type="file" id="game-thumbnail" accept="image/*" onchange="previewThumbnail(this)">
            <img id="thumbnail-preview" src="" style="display:none; max-width:200px;">
          </div>
        </div>

        <div id="library-panel">
          <h3>要素ライブラリ</h3>
          <div id="library-list"></div>
          <div id="library-buttons">
            <button onclick="addLibrary('affection')">好感度</button>
            <button onclick="addLibrary('dice')">ダイス</button>
            <button onclick="addLibrary('san')">SAN値</button>
            <button onclick="addLibrary('counter')">カウンター</button>
            <button onclick="addLibrary('money')">所持金</button>
            <button onclick="addLibrary('time')">時間/日数</button>
            <button onclick="addLibrary('flag')">フラグ</button>
            <button onclick="addLibrary('hp')">HP</button>
            <button onclick="addLibrary('mp')">MP</button>
            <button onclick="addLibrary('level')">レベル</button>
            <button onclick="addLibrary('exp')">経験値</button>
            <button onclick="addLibrary('inventory')">アイテム</button>
            <button onclick="addLibrary('skill')">技能値</button>
            <button onclick="addLibrary('charsheet')">キャラシ</button>
            <button onclick="addLibrary('score')">スコア</button>
            <button onclick="addLibrary('timer')">タイマー</button>
            <button onclick="addLibrary('result')">結果表示</button>
            <button onclick="addLibrary('character')">キャラ登場</button>
          </div>
          <div class="custom-var-section">
            <h4>オリジナル変数</h4>
            <div id="custom-var-list"></div>
            <button class="add-btn" onclick="addCustomVar()">＋ 独自変数追加</button>
          </div>
        </div>

        <div id="tree-editor">
          <h3>シーンツリー管理</h3>
          <div id="scene-tree"></div>
          <button class="add-scene-btn" onclick="addNewScene()">＋ 新しいシーンを作成</button>
        </div>
        <button id="upload-btn" onclick="uploadGame()">🌍 世界に公開する</button>
      </div>
    </div>

    <div id="notice-tab" style="display:none">
      <div class="tab-header">
        <h2>📢 運営ニュース</h2>
        <button id="admin-notice-btn" style="display:none" onclick="openAdminPostModal()" class="admin-btn">管理者投稿</button>
      </div>
      <div id="notice-list"></div>
    </div>

    <div id="board-tab" style="display:none">
      <div class="board-sub-tabs">
        <button class="sub-tab active" onclick="switchBoardTab('all')">全投稿</button>
        <button class="sub-tab" onclick="switchBoardTab('announcement')">プレイヤー告知</button>
        <button class="sub-tab" onclick="switchBoardTab('following')">フォロー中</button>
      </div>
      <div id="board-actions">
        <button class="post-open-btn" onclick="showBoardPostForm()">＋ 新規スレッド作成</button>
      </div>
      <div id="post-form-area" style="display:none">
        <div class="board-post-form">
          <textarea id="board-post-text" placeholder="ここに内容を入力..."></textarea>
          <input type="file" id="board-post-image" accept="image/*">
          <div class="board-form-actions">
            <button class="submit-btn" onclick="submitBoardPost()">投稿する</button>
            <button class="cancel-btn" onclick="hidePostForm()">閉じる</button>
          </div>
        </div>
      </div>
      <div id="board-list"></div>
    </div>
  </main>

  <div id="trpg-modal" class="modal-overlay" style="display:none">
    <div class="modal large-modal">
      <h2>TRPGキャラクター作成</h2>
      <div class="modal-scroll-area">
        <div class="form-row">
          <label>探索者名</label>
          <input type="text" id="trpg-name-input">
        </div>
        <div class="form-row">
          <label>アイコン(画像URL)</label>
          <input type="text" id="trpg-avatar-input" placeholder="https://...">
        </div>
        
        <div class="status-roll-container">
          <h3>ステータス決定</h3>
          <button class="dice-btn" onclick="rollTRPGStats()">🎲 ダイスを一括で振る (3d6+10)</button>
          <p id="trpg-stat-total-label">残り振り分けポイント: <span id="trpg-stat-points">--</span></p>
          <div id="trpg-stat-inputs" class="stat-grid">
            </div>
        </div>

        <div class="skill-selection-container">
          <h3>技能習得 (1つ選択)</h3>
          <select id="trpg-skill-select" class="full-select">
            <optgroup label="探索・知覚">
              <option value="目星">目星</option><option value="聞き耳">聞き耳</option><option value="図書館">図書館</option>
              <option value="追跡">追跡</option><option value="鑑定">鑑定</option><option value="観察">観察</option>
            </optgroup>
            <optgroup label="行動・身体">
              <option value="隠密">隠密</option><option value="跳躍">跳躍</option><option value="登攀">登攀</option>
              <option value="水泳">水泳</option><option value="投擲">投擲</option><option value="回避">回避</option>
              <option value="手話">手話</option><option value="乗馬">乗馬</option>
            </optgroup>
            <optgroup label="交渉・対人">
              <option value="言いくるめ">言いくるめ</option><option value="説得">説得</option><option value="威圧">威圧</option>
              <option value="魅了">魅了</option><option value="心理学">心理学</option><option value="値切り">値切り</option>
            </optgroup>
            <optgroup label="知識・学術">
              <option value="医学">医学</option><option value="応急手当">応急手当</option><option value="精神分析">精神分析</option>
              <option value="歴史">歴史</option><option value="考古学">考古学</option><option value="人類学">人類学</option>
              <option value="生物学">生物学</option><option value="地質学">地質学</option><option value="物理学">物理学</option>
              <option value="化学">化学</option><option value="天文学">天文学</option><option value="オカルト">オカルト</option>
              <option value="クトゥルフ神話">クトゥルフ神話</option>
            </optgroup>
            <optgroup label="技術・芸術">
              <option value="鍵開け">鍵開け</option><option value="機械修理">機械修理</option><option value="電気修理">電気修理</option>
              <option value="コンピューター">コンピューター</option><option value="製作(任意)">製作</option><option value="芸術(任意)">芸術</option>
              <option value="写真術">写真術</option><option value="変装">変装</option>
            </optgroup>
            <optgroup label="戦闘">
              <option value="こぶし">こぶし</option><option value="キック">キック</option><option value="組み付き">組み付き</option>
              <option value="頭突き">頭突き</option><option value="拳銃">拳銃</option><option value="ライフル">ライフル</option>
              <option value="ショットガン">ショットガン</option><option value="日本刀">日本刀</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="submit-btn" id="trpg-save-btn" disabled onclick="saveTRPGCharacter()">このキャラクターを確定</button>
        <button class="modal-close-btn" onclick="closeTRPGModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
